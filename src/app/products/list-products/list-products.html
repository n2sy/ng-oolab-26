<table class="table table-striped">
  <thead>
    <th>ID</th>
    <th>Name</th>
    <th>Price</th>
    <th>Quantity</th>
  </thead>
  <tbody>
    @for(product of productSer.allProducts(); track $index) {
    <tr>
      <td>{{ product.id }}</td>
      <td>{{ product.name }}</td>
      <td>{{ product.price }}</td>
      <td>
        <button
          class="btn"
          [ngClass]="{
            'btn-danger' : !product.isSelected,
            'btn-success' : product.isSelected
          }"
          (click)="productSer.updateProduct(product.id)"
        >
          {{ product.isSelected ? 'Selected' : 'Not Selected' }}
        </button>
      </td>
      <td>
        <button (click)="productSer.deleteProduct(product.id)" class="btn btn-outline-danger">
          Delete
        </button>
      </td>
    </tr>
    }
  </tbody>
</table>
