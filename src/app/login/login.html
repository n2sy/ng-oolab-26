@if(showError) {
<div class="alert alert-danger">Login et/ou mot de passe invalides</div>

}

<form #f="ngForm" (ngSubmit)="submitHandler($event, f)">

  <input #log="ngModel" required email ngModel name="email" class="form-control" />

  @if(log.dirty && log.invalid) {
  <div class="alert alert-danger">Veuillez saisir une adresse mail valide</div>

  }

  <label>Mot de passe</label>
  <input required minlength="3" ngModel name="password" class="form-control" />
  <br />
